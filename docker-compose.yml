# Coolify-ready compose file for the Algonest RIS app.
#
# Coolify supports two app types: "Dockerfile" and "Docker Compose".
# Use this file with the Docker Compose option so all build args + env
# vars are co-located. The image is built from the repo Dockerfile.
#
# In Coolify:
#   1. New Resource → Application → Docker Compose
#   2. Point at this repo / branch
#   3. Service Name: web
#   4. Configure environment variables in the Coolify UI (overrides any
#      values below). NEXT_PUBLIC_* must also be set as Build Args so they
#      get inlined into the client bundle.
#   5. Set the public domain to https://repo.algonest.tech

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_OPENALEX_INSTITUTION_ID: ${NEXT_PUBLIC_OPENALEX_INSTITUTION_ID:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    image: algonest-repo:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Public — exposed to the browser bundle (must match build args).
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_OPENALEX_INSTITUTION_ID: ${NEXT_PUBLIC_OPENALEX_INSTITUTION_ID:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      # Private — server-side only.
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ORCID_CLIENT_ID: ${ORCID_CLIENT_ID:-}
      ORCID_CLIENT_SECRET: ${ORCID_CLIENT_SECRET:-}
      SCOPUS_API_KEY: ${SCOPUS_API_KEY:-}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
      INDEXNOW_KEY: ${INDEXNOW_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      coolify.managed: "true"
